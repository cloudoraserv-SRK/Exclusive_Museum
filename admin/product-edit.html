<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Product | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<header class="admin-header">
  <h1>Edit Product</h1>
  <a href="products.html" class="btn-outline">← Back</a>
</header>

<main class="admin-layout">

  <!-- PRODUCT DETAILS -->
  <section class="card">
    <h2>Product Details</h2>

    <label>Name</label>
    <input id="name" type="text">

    <label>Slug</label>
    <input id="slug" type="text">

    <div class="grid-2">
      <div>
        <label>MRP</label>
        <input id="mrp" type="number">
      </div>
      <div>
        <label>Price</label>
        <input id="price" type="number">
      </div>
    </div>

    <label>Short Description</label>
    <textarea id="shortDesc"></textarea>

    <label>Long Description</label>
    <textarea id="longDesc"></textarea>

    <label class="checkbox-row">
      <input type="checkbox" id="active"> Active
    </label>
  </section>

  <!-- BRAND & CATEGORY -->
  <section class="card">
    <h2>Brand & Category</h2>

    <label>Brand</label>
    <select id="brand"></select>

    <label>Category</label>
    <select id="category"></select>
  </section>

  <!-- VARIANTS (READ ONLY) -->
  <section class="card" id="variantsSection">
    <h2>Variants</h2>

    <label>Color</label>
    <select id="colorSelect"></select>

    <div id="sizeList" class="size-readonly"></div>

    <p class="note">
      Variants & sizes are managed separately.
    </p>

    <a href="#" id="variantsBtn" class="btn-secondary">
      ⚙️ Manage Variants
    </a>
  </section>

  <!-- IMAGES -->
  <section class="card">
    <h2>Images</h2>

    <p class="muted">
      Upload images for selected variant.
    </p>

    <input type="file" id="images" multiple>

    <div id="imageGallery" class="image-gallery"></div>

    <button id="syncImagesBtn" class="btn-outline">
      🔄 Sync Images
    </button>
  </section>

  <button id="saveProduct" class="btn-primary">
    Save Product
  </button>

</main>

<script type="module" src="product-edit.js"></script>
</body>
</html>
