<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Product | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<header class="admin-header">
  <h1>Edit Product</h1>
  <a href="products.html" class="btn-outline">← Back</a>
</header>

<main class="admin-layout">


<!-- PRODUCT DETAILS -->
<section class="card">
<h2>Product Details</h2>

<label>Name</label>
<input id="name" type="text">

<label>Slug</label>
<input id="slug" type="text">

<div class="grid-2">

<div>
<label>MRP</label>
<input id="mrp" type="number">
</div>

<div>
<label>Price</label>
<input id="price" type="number">
</div>

</div>

<label>Short Description</label>
<textarea id="shortDesc"></textarea>

<label>Long Description</label>
<textarea id="longDesc"></textarea>

<label class="checkbox-row">
<input type="checkbox" id="active"> Active
</label>

</section>


<!-- BRAND CATEGORY -->
<section class="card">

<h2>Brand & Category</h2>

<label>Brand</label>
<select id="brand"></select>

<label>Category</label>
<select id="category"></select>

</section>


<!-- VARIANTS -->
<section class="card" id="variantsSection">

<h2>Variants</h2>

<label>Color</label>
<select id="colorSelect"></select>

<div id="sizeList" class="size-readonly"></div>

<p class="note">
Variants & sizes are managed separately.
</p>

<a href="#" id="variantsBtn" class="btn-secondary">
⚙ Manage Variants
</a>

</section>


<!-- IMAGES -->
<section class="card">

<h2>Images</h2>

<p class="muted">
Upload images for selected variant
</p>

<input type="file" id="images" multiple>

<button id="syncImagesBtn" class="btn-outline">
Sync Images
</button>

</section>


<!-- PRODUCT SPECIFICATIONS -->
<section class="card">

<h2>Specifications</h2>

<div id="specList"></div>

<button id="addSpec" class="btn-outline">
+ Add Specification
</button>

</section>

<!-- Materials-->
<section class="card">

<h2>Materials</h2>

<label>Gold Type</label>
<input id="goldType">

<label>Gold Weight (grams)</label>
<input id="goldWeight">

<label>Diamond Carat</label>
<input id="diamondCarat">

<label>Diamond Count</label>
<input id="diamondCount">

<label>Wood Type</label>
<input id="woodType">

</section>
  <!--Specifications for Watch-->
  <section class="card">

<h2>Watch Details</h2>

<label>Case Size</label>
<input id="caseSize">

<label>Movement</label>
<input id="movement">

<label>Glass</label>
<input id="glass">

<label>Water Resistance</label>
<input id="waterResistance">

<label>Crafting Time</label>
<input id="craftingTime">

  </section>
  
<!--customization-->
<section class="card">

<h2>Customization</h2>

<label><input type="checkbox" value="dial engraving" class="customOpt"> Dial Engraving</label>

<label><input type="checkbox" value="bracelet engraving" class="customOpt"> Bracelet Engraving</label>

<label><input type="checkbox" value="diamond lettering" class="customOpt"> Diamond Lettering</label>

<label><input type="checkbox" value="family engraving" class="customOpt"> Family Engraving</label>

</section>
  <!--reviews-->
  <section class="card">

<h2>Reviews</h2>

<div id="reviewList"></div>

<button id="addReview" class="btn-outline">
+ Add Review
</button>

</section>
  <!--faqs-->
  <section class="card">

<h2>FAQ</h2>

<div id="faqAdmin"></div>

<button id="addFaq" class="btn-outline">
+ Add FAQ
</button>

</section>
<!-- SAVE -->
<section class="card">

<button id="saveProduct" class="btn-primary">
Save Product
</button>

</section>

</main>

<script type="module" src="product-edit.js"></script>
</body>

</html>
