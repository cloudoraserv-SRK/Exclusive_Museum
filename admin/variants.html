<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Product Gallery | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="variants.css">
</head>
<body>

<h2>Manage Product Gallery</h2>

<!-- PRODUCT SELECT -->
<section>
  <label>Product</label>
  <select id="productSelect"></select>
</section>

<hr>

<section>
  <h3>Gallery Images</h3>

  <p class="muted">
    Current schema does not include per-color or per-size variant tables.
    Use this page to manage product gallery images.
  </p>
  <input id="imageFiles" type="file" multiple>
  <button id="addColorBtn">Upload Images</button>

  <ul id="colorList"></ul>
</section>

<hr>

<section>
  <h3>Gallery List</h3>

  <p id="selectedColorNote" class="muted">
    Select a product to view its gallery.
  </p>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Preview</th>
        <th>Source</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="variantsTable"></tbody>
  </table>
</section>

<script type="module" src="variants.js"></script>
</body>
</html>
